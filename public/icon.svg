<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0e0e12"/>
  <!-- Rubik's cube simplified 3D icon -->
  <!-- Top face -->
  <polygon points="256,80 380,150 256,220 132,150" fill="#3b82f6" opacity="0.95"/>
  <!-- Left face -->
  <polygon points="132,150 256,220 256,360 132,290" fill="#1d4ed8" opacity="0.95"/>
  <!-- Right face -->
  <polygon points="380,150 256,220 256,360 380,290" fill="#60a5fa" opacity="0.95"/>
  <!-- Grid lines top -->
  <line x1="214" y1="103" x2="214" y2="197" stroke="#0e0e12" stroke-width="4"/>
  <line x1="298" y1="103" x2="298" y2="197" stroke="#0e0e12" stroke-width="4"/>
  <line x1="172" y1="127" x2="340" y2="127" stroke="#0e0e12" stroke-width="4"/>
  <line x1="144" y1="172" x2="368" y2="172" stroke="#0e0e12" stroke-width="4"/>
  <!-- Grid lines left -->
  <line x1="132" y1="197" x2="256" y2="267" stroke="#0e0e12" stroke-width="4"/>
  <line x1="132" y1="243" x2="256" y2="313" stroke="#0e0e12" stroke-width="4"/>
  <line x1="172" y1="220" x2="172" y2="360" stroke="#0e0e12" stroke-width="4"/>
  <line x1="214" y1="243" x2="214" y2="383" stroke="#0e0e12" stroke-width="4"/>
  <!-- Grid lines right -->
  <line x1="380" y1="197" x2="256" y2="267" stroke="#0e0e12" stroke-width="4"/>
  <line x1="380" y1="243" x2="256" y2="313" stroke="#0e0e12" stroke-width="4"/>
  <line x1="340" y1="220" x2="340" y2="360" stroke="#0e0e12" stroke-width="4"/>
  <line x1="298" y1="243" x2="298" y2="383" stroke="#0e0e12" stroke-width="4"/>
  <!-- Colored stickers top -->
  <polygon points="256,86 303,112 256,138 209,112" fill="#f97316" opacity="0.9"/>
  <!-- Colored stickers left bottom -->
  <polygon points="145,268 192,294 192,333 145,307" fill="#22c55e" opacity="0.9"/>
  <!-- Colored stickers right bottom -->
  <polygon points="367,268 320,294 320,333 367,307" fill="#ef4444" opacity="0.9"/>
</svg>
